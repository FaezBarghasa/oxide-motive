[package]
name = "oxide-firmware"
version = "0.1.0"
edition = "2021"

[dependencies]
oxide-protocol = { path = "../oxide-protocol" }
heapless = { workspace = true }
postcard = { workspace = true }
serde = { workspace = true }
embassy-sync = { workspace = true }
cortex-m = { version = "0.7.7", features = ["critical-section-single-core"] }
cortex-m-rt = "0.7.3"
embassy-executor = { version = "0.5.0", features = ["task-arena-size-32768", "arch-cortex-m", "executor-thread", "integrated-timers"] }
embassy-time = { version = "0.3.0", features = ["tick-hz-1_000_000"] }
embassy-rp = { version = "0.1.0", features = ["unstable-pac", "time-driver", "cortex-m-rt", "critical-section-impl"] }
panic-probe = { version = "0.3.1", features = ["print-rtt"] }
defmt = "0.3.6"
defmt-rtt = "0.4.1"
futures = { version = "0.3.30", default-features = false, features = ["async-await"] }

[build-dependencies]
anyhow = "1.0.82"
fs_extra = "1.3.0"
winreg = "0.52.0"
