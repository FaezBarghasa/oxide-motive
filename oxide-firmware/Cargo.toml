[package]
name = "oxide-firmware"
version = "0.1.0"
edition = "2021"

[dependencies]
oxide-protocol = { path = "../oxide-protocol" }
oxide-hal = { path = "../oxide-hal" }
oxide-math = { path = "../oxide-math" }
heapless = { workspace = true }
postcard = { workspace = true }
serde = { workspace = true }
rtic = { workspace = true }
cortex-m-rtic = { workspace = true }
stm32h7xx-hal = { workspace = true, optional = true }

[features]
default = []
stm32h7 = ["stm32h7xx-hal"]
nxp_s32k = ["s32k-hal"]
renesas_ra = ["renesas-ra"]
