name: Workspace CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable
    - name: Run Tests
      run: cargo test --workspace
    - name: Check Clippy
      run: cargo clippy --workspace -- -D warnings
    - name: Check Format
      run: cargo fmt --all -- --check
