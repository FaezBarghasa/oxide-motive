[workspace]
members = [
    "oxide-protocol",
    "oxide-firmware",
    "oxide-host",
    "oxide-hal",
    "oxide-math",
    "oxide-sim", # Added for virtual MCU/Host
]
resolver = "2"

[workspace.dependencies]
heapless = { version = "0.8", default-features = false }
postcard = { version = "1.0", features = ["alloc"] }
serde = { version = "1.0", default-features = false, features = ["derive"] }
embassy-sync = { version = "0.5", features = ["std", "nightly"] } # Using std for host, nightly for firmware
cobs = "0.2"

[profile.release]
codegen-units = 1 # better optimizations
debug = true # Embed debug info
lto = true # Link-time optimization
opt-level = "s" # Optimize for size
strip = "symbols" # Strip symbols from the binary

[profile.dev]
debug = true
opt-level = 0
overflow-checks = true

[profile.test]
debug = true
opt-level = 0
overflow-checks = true
